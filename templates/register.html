{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width: 380px; margin: 50px auto;">
    <h2>Register</h2>
    <form method="POST">
        <label>Username</label>
        <input type="text" name="username" required>
        <label>Password</label>
        <input type="password" name="password" required>
        <button class="btn btn-primary" style="margin-top: 16px; width: 100%;">Register</button>
    </form>
    <p style="margin-top: 12px; font-size: 13px;">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
</div>
{% endblock %}
