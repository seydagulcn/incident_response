{% extends "base.html" %}
{% block content %}
<h2>Add New Incident</h2>
<div class="card">
    <form method="POST">
        <label>Title</label>
        <input type="text" name="title" required placeholder="Give a short title for the incident" maxlength="100">

        <label>Incident Type</label>
        <select name="incident_type" required>
            <option value="">-- Select type --</option>
            <option value="Data Breach">Data Breach</option>
            <option value="Privilege Escalation">Privilege Escalation</option>
            <option value="Phishing">Phishing</option>
            <option value="Ransomware">Ransomware</option>
            <option value="DDoS">DDoS</option>
            <option value="Insider Threat">Insider Threat</option>
            <option value="Malware">Malware</option>
            <option value="Other">Other</option>
        </select>

        <label>Severity</label>
        <select name="severity" required>
            <option value="">-- Select severity --</option>
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
            <option value="critical">Critical</option>
        </select>

        <label>Incident Started At</label>
        <input type="datetime-local" name="started_at" required>

        <label>Detected At</label>
        <input type="datetime-local" name="detected_at" required>

        <label>Action Taken</label>
        <textarea name="action_taken" rows="3" maxlength="500" placeholder="Describe what was done after the incident was detected"></textarea>

        <div style="margin-top: 18px; display: flex; gap: 10px;">
            <button class="btn btn-primary" type="submit">Add Incident</button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
