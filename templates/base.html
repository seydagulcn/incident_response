<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Incident Tracker</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f4f4f4; color: #333; }
        nav { background: #2c3e50; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: #ecf0f1; text-decoration: none; margin-left: 14px; font-size: 14px; }
        nav a:hover { text-decoration: underline; }
        .brand { color: white; font-weight: bold; font-size: 16px; }
        .container { max-width: 960px; margin: 30px auto; padding: 0 16px; }
        .card { background: white; border-radius: 6px; padding: 20px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .btn { display: inline-block; padding: 8px 14px; border-radius: 4px; font-size: 13px; cursor: pointer; border: none; text-decoration: none; }
        .btn-primary { background: #27ae60; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-secondary { background: #ecf0f1; color: #333; border: 1px solid #ccc; }
        .btn:hover { opacity: 0.85; }
        .flash { background: #d6eaf8; border-left: 4px solid #3498db; padding: 10px 14px; margin-bottom: 14px; border-radius: 4px; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { color: #777; font-weight: 600; background: #f9f9f9; }
        input, select, textarea { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; margin-top: 4px; }
        label { font-size: 13px; color: #555; display: block; margin-top: 12px; }
        .badge { padding: 3px 9px; border-radius: 10px; font-size: 12px; font-weight: bold; }
        .badge-open { background: #d6eaf8; color: #2980b9; }
        .badge-closed { background: #d5f5e3; color: #1e8449; }
        .badge-critical { background: #fadbd8; color: #c0392b; }
        .badge-high { background: #fdebd0; color: #d35400; }
        .badge-medium { background: #fef9e7; color: #b7950b; }
        .badge-low { background: #f4f4f4; color: #888; }
        h2 { margin-bottom: 16px; color: #2c3e50; }
        .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
        .metric-box { background: white; border-radius: 6px; padding: 16px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        .metric-value { font-size: 26px; font-weight: bold; color: #2980b9; }
        .metric-label { font-size: 12px; color: #888; margin-top: 4px; }
    </style>
</head>
<body>
<nav>
    <span class="brand">Incident Response Tracker</span>
    <div>
        {% if session.username %}
            <span style="color:#bdc3c7; font-size:13px;">{{ session.username }}</span>
            <a href="{{ url_for('logout') }}">Logout</a>
        {% else %}
            <a href="{{ url_for('login') }}">Login</a>
            <a href="{{ url_for('register') }}">Register</a>
        {% endif %}
    </div>
</nav>
<div class="container">
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for msg in messages %}
                <div class="flash">{{ msg }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
</div>
</body>
</html>
